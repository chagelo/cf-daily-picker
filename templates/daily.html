<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CF 每日练习 ({{date}})</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
  :root {
    --primary: #3b82f6;
    --primary-light: #eff6ff;
    --primary-dark: #1d4ed8;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --code-bg: #f1f5f9;
    --tag-bg: #dbeafe;
    --tag-text: #1e40af;
    --success: #10b981;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    padding: 20px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
  }

  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .header .subtitle {
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .header .date-badge {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    margin-top: 12px;
    font-weight: 500;
  }

  /* Problem Card */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin: 24px 0;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }

  .card:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .card-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--primary-dark);
  }

  .card-title a {
    color: inherit;
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .card-title a:hover {
    border-color: var(--primary);
  }

  .rating-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--primary-light);
    color: var(--primary-dark);
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 500;
  }

  /* Sections */
  .section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .section:first-of-type {
    border-top: none;
    padding-top: 0;
  }

  .section-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--primary);
    border-radius: 2px;
  }

  .section-content {
    color: var(--text);
    font-size: 0.95rem;
  }

  .section-content p {
    margin: 8px 0;
  }

  .section-content ul, .section-content ol {
    padding-left: 24px;
    margin: 8px 0;
  }

  .section-content li {
    margin: 4px 0;
  }

  .section-content h2 { font-size: 1.15rem; margin: 20px 0 10px; color: var(--text); }
  .section-content h3 { font-size: 1.05rem; margin: 16px 0 8px; color: var(--text); }
  .section-content h4 { font-size: 0.95rem; margin: 12px 0 6px; color: var(--text); }

  /* Code */
  pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.88rem;
    line-height: 1.6;
    margin: 12px 0;
    border: 1px solid var(--border);
  }

  code {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.88em;
  }

  pre code {
    background: none;
    padding: 0;
  }

  /* KaTeX overrides */
  .katex { font-size: 1.05em; }
  .katex-display { margin: 16px 0; overflow-x: auto; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 10px 0;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px 0 20px;
    color: var(--text-secondary);
    font-size: 0.82rem;
  }

  .footer a {
    color: var(--primary);
    text-decoration: none;
  }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 12px; }
    .card { padding: 20px; }
    .header h1 { font-size: 1.4rem; }
    .card-title { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Codeforces 每日练习</h1>
    <div class="subtitle">每天两道题，稳步提升</div>
    <div class="date-badge">{{date}}</div>
  </div>

  {{cards_html}}

  <div class="footer">
    Generated by <a href="https://github.com/chagelo/cf-daily-picker">CF Daily Picker</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
  renderMathInElement(document.body, {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$", right: "$", display: false},
      {left: "\\(", right: "\\)", display: false},
      {left: "\\[", right: "\\]", display: true}
    ],
    throwOnError: false
  });
</script>
</body>
</html>
