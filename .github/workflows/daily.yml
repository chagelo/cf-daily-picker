name: CF Daily Picker

on:
  schedule:
    # UTC 12:00 = 北京时间 20:00
    - cron: '0 12 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  pick-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily picker
        env:
          # 敏感信息通过 GitHub Secrets 注入，覆盖 config.yaml 中的空值
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECHAT_KEY: ${{ secrets.WECHAT_KEY }}
          RULIU_WEBHOOK: ${{ secrets.RULIU_WEBHOOK }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python main.py

      - name: Commit sent records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent.json
          git diff --cached --quiet || git commit -m "chore: update sent records [skip ci]"
          git push
